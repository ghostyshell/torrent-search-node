<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Monitoring Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #334155;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .refresh-btn:hover {
            background: #2563eb;
        }

        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #94a3b8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }

        .card-title {
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #f8fafc;
        }

        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .stat-item {
            padding: 12px;
            background: #0f172a;
            border-radius: 8px;
        }

        .stat-item-value {
            font-size: 20px;
            font-weight: 600;
        }

        .stat-item-label {
            font-size: 11px;
            color: #64748b;
            margin-top: 2px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #0f172a;
            border-radius: 8px;
        }

        .task-info {
            flex: 1;
        }

        .task-name {
            font-weight: 500;
            font-size: 14px;
        }

        .task-time {
            font-size: 11px;
            color: #64748b;
            margin-top: 4px;
        }

        .task-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-idle {
            background: #1e3a5f;
            color: #60a5fa;
        }

        .status-completed {
            background: #14532d;
            color: #4ade80;
        }

        .status-disabled {
            background: #3f3f46;
            color: #a1a1aa;
        }

        .status-error {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .logs-container {
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
        }

        .log-entry {
            padding: 8px 12px;
            border-bottom: 1px solid #1e293b;
            display: flex;
            gap: 12px;
        }

        .log-entry:hover {
            background: #1e293b;
        }

        .log-time {
            color: #64748b;
            white-space: nowrap;
        }

        .log-level {
            font-weight: 600;
            width: 50px;
        }

        .log-level-info { color: #60a5fa; }
        .log-level-warn { color: #fbbf24; }
        .log-level-error { color: #f87171; }
        .log-level-debug { color: #a78bfa; }

        .log-message {
            flex: 1;
            word-break: break-word;
        }

        .endpoint-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .endpoint-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #0f172a;
            border-radius: 6px;
            font-size: 13px;
        }

        .endpoint-path {
            font-family: monospace;
            color: #94a3b8;
        }

        .endpoint-count {
            font-weight: 600;
            color: #60a5fa;
        }

        .method-stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .method-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .method-get { background: #14532d; color: #4ade80; }
        .method-post { background: #1e3a5f; color: #60a5fa; }
        .method-put { background: #78350f; color: #fbbf24; }
        .method-delete { background: #7f1d1d; color: #f87171; }

        .status-stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-2xx { background: #14532d; color: #4ade80; }
        .status-3xx { background: #1e3a5f; color: #60a5fa; }
        .status-4xx { background: #78350f; color: #fbbf24; }
        .status-5xx { background: #7f1d1d; color: #f87171; }

        .recent-requests {
            max-height: 300px;
            overflow-y: auto;
        }

        .request-item {
            display: flex;
            gap: 12px;
            padding: 8px 12px;
            border-bottom: 1px solid #1e293b;
            font-size: 12px;
            align-items: center;
        }

        .request-method {
            font-weight: 600;
            width: 50px;
        }

        .request-path {
            flex: 1;
            font-family: monospace;
            color: #94a3b8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .request-status {
            font-weight: 500;
        }

        .request-duration {
            color: #64748b;
            white-space: nowrap;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
        }

        .tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: #64748b;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
        }

        .tab.active {
            background: #334155;
            color: #f8fafc;
        }

        .tab:hover:not(.active) {
            color: #94a3b8;
        }

        .db-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .db-stat {
            text-align: center;
            padding: 12px;
            background: #0f172a;
            border-radius: 8px;
        }

        .db-stat-value {
            font-size: 24px;
            font-weight: 700;
        }

        .db-stat-label {
            font-size: 10px;
            color: #64748b;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .error-message {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Backend Monitoring Dashboard</h1>
        <div class="header-controls">
            <label class="auto-refresh">
                <input type="checkbox" id="autoRefresh" checked>
                Auto-refresh (10s)
            </label>
            <button class="refresh-btn" onclick="refreshAll()">Refresh Now</button>
        </div>
    </div>

    <div id="error-container"></div>

    <div class="grid">
        <!-- System Stats -->
        <div class="card">
            <div class="card-title">System</div>
            <div class="stat-grid">
                <div class="stat-item">
                    <div class="stat-item-value" id="uptime">-</div>
                    <div class="stat-item-label">Uptime</div>
                </div>
                <div class="stat-item">
                    <div class="stat-item-value" id="memory">-</div>
                    <div class="stat-item-label">Memory (MB)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-item-value" id="nodeVersion">-</div>
                    <div class="stat-item-label">Node.js</div>
                </div>
            </div>
        </div>

        <!-- API Stats -->
        <div class="card">
            <div class="card-title">API Usage</div>
            <div class="stat-value" id="totalRequests">-</div>
            <div class="stat-label">Total Requests</div>
            <div style="margin-top: 12px; font-size: 14px; color: #94a3b8;">
                <span id="requestsPerMin">-</span> req/min
            </div>
            <div class="method-stats" id="methodStats"></div>
            <div class="status-stats" id="statusStats"></div>
        </div>

        <!-- Database Stats -->
        <div class="card">
            <div class="card-title">Database</div>
            <div class="db-stats" id="dbStats">
                <div class="loading">Loading...</div>
            </div>
        </div>

        <!-- Background Tasks -->
        <div class="card">
            <div class="card-title">Background Tasks</div>
            <div class="task-list" id="taskList">
                <div class="loading">Loading...</div>
            </div>
        </div>

        <!-- Top Endpoints -->
        <div class="card">
            <div class="card-title">Top Endpoints</div>
            <div class="endpoint-list" id="topEndpoints">
                <div class="loading">Loading...</div>
            </div>
        </div>

        <!-- Recent Requests -->
        <div class="card">
            <div class="card-title">Recent Requests</div>
            <div class="recent-requests" id="recentRequests">
                <div class="loading">Loading...</div>
            </div>
        </div>

        <!-- Stream URL Refresh Logs -->
        <div class="card full-width">
            <div class="card-title">
                Stream URL Refresh Job
                <button class="refresh-btn" onclick="triggerStreamUrlRefresh()" id="triggerStreamRefreshBtn" style="margin-left: 16px;">
                    Trigger Refresh Now
                </button>
            </div>
            <div id="streamRefreshStatus" style="margin-bottom: 12px; padding: 8px; border-radius: 6px; font-size: 13px;"></div>
            <div class="logs-container" id="streamRefreshLogs" style="max-height: 300px;">
                <div class="loading">Loading...</div>
            </div>
        </div>

        <!-- Logs -->
        <div class="card full-width">
            <div class="card-title">Application Logs</div>
            <div class="tabs">
                <button class="tab active" onclick="changeLogLevel('all')">All</button>
                <button class="tab" onclick="changeLogLevel('info')">Info</button>
                <button class="tab" onclick="changeLogLevel('warn')">Warn</button>
                <button class="tab" onclick="changeLogLevel('error')">Error</button>
            </div>
            <div class="logs-container" id="logsContainer">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        let currentLogLevel = 'all';
        let refreshInterval = null;

        async function fetchDashboard() {
            try {
                const response = await fetch('/api/monitoring/dashboard');
                const data = await response.json();

                if (!data.success) throw new Error(data.error);

                // System stats
                document.getElementById('uptime').textContent = formatUptime(data.system.uptime);
                document.getElementById('memory').textContent = data.system.memory.heapUsed;
                document.getElementById('nodeVersion').textContent = data.system.nodeVersion;

                // API stats
                document.getElementById('totalRequests').textContent = data.api.totalRequests.toLocaleString();
                document.getElementById('requestsPerMin').textContent = data.api.requestsPerMinute.toFixed(2);

                // Method stats
                const methodStats = document.getElementById('methodStats');
                methodStats.innerHTML = Object.entries(data.api.byMethod)
                    .map(([method, count]) => `
                        <span class="method-badge method-${method.toLowerCase()}">${method}: ${count}</span>
                    `).join('');

                // Status stats
                const statusStats = document.getElementById('statusStats');
                statusStats.innerHTML = Object.entries(data.api.byStatus)
                    .map(([status, count]) => `
                        <span class="status-badge status-${status}">${status}: ${count}</span>
                    `).join('');

                // Database stats
                if (data.database) {
                    const dbStats = document.getElementById('dbStats');
                    dbStats.innerHTML = Object.entries(data.database)
                        .filter(([key]) => !['databaseType', 'environment', 'torrentDetails', 'favoriteScreenshots', 'cache'].includes(key))
                        .map(([key, value]) => `
                            <div class="db-stat">
                                <div class="db-stat-value">${value}</div>
                                <div class="db-stat-label">${formatLabel(key)}</div>
                            </div>
                        `).join('');
                }

                // Background tasks
                const taskList = document.getElementById('taskList');
                taskList.innerHTML = data.backgroundTasks.map(task => `
                    <div class="task-item">
                        <div class="task-info">
                            <div class="task-name">${formatTaskName(task.name)}</div>
                            <div class="task-time">
                                ${task.lastRun ? `Last: ${formatTime(task.lastRun)}` : 'Never run'}
                                ${task.nextRun ? ` | Next: ${formatTimeUntil(task.nextRun)}` : ''}
                            </div>
                        </div>
                        <span class="task-status status-${task.status}">${task.status}</span>
                    </div>
                `).join('');

                clearError();
            } catch (error) {
                showError('Failed to fetch dashboard: ' + error.message);
            }
        }

        async function fetchApiUsage() {
            try {
                const response = await fetch('/api/monitoring/api-usage');
                const data = await response.json();

                if (!data.success) throw new Error(data.error);

                // Top endpoints
                const topEndpoints = document.getElementById('topEndpoints');
                if (data.stats.topEndpoints.length > 0) {
                    topEndpoints.innerHTML = data.stats.topEndpoints.slice(0, 10).map(ep => `
                        <div class="endpoint-item">
                            <span class="endpoint-path">${ep.endpoint}</span>
                            <span class="endpoint-count">${ep.count}</span>
                        </div>
                    `).join('');
                } else {
                    topEndpoints.innerHTML = '<div class="loading">No requests yet</div>';
                }

                // Recent requests
                const recentRequests = document.getElementById('recentRequests');
                if (data.recentRequests.length > 0) {
                    recentRequests.innerHTML = data.recentRequests.map(req => `
                        <div class="request-item">
                            <span class="request-method method-${req.method.toLowerCase()}">${req.method}</span>
                            <span class="request-path" title="${req.path}">${req.path}</span>
                            <span class="request-status status-${Math.floor(req.status/100)}xx">${req.status}</span>
                            <span class="request-duration">${req.duration}ms</span>
                        </div>
                    `).join('');
                } else {
                    recentRequests.innerHTML = '<div class="loading">No requests yet</div>';
                }
            } catch (error) {
                console.error('Failed to fetch API usage:', error);
            }
        }

        async function fetchLogs(level = 'all') {
            try {
                const response = await fetch(`/api/monitoring/logs?level=${level}&limit=100`);
                const data = await response.json();

                if (!data.success) throw new Error(data.error);

                const logsContainer = document.getElementById('logsContainer');
                if (data.logs.length > 0) {
                    logsContainer.innerHTML = data.logs.map(log => `
                        <div class="log-entry">
                            <span class="log-time">${formatTime(log.timestamp)}</span>
                            <span class="log-level log-level-${log.level.toLowerCase()}">${log.level}</span>
                            <span class="log-message">${log.message || ''} ${log.method ? `${log.method} ${log.url}` : ''}</span>
                        </div>
                    `).join('');
                } else {
                    logsContainer.innerHTML = '<div class="loading">No logs found</div>';
                }
            } catch (error) {
                document.getElementById('logsContainer').innerHTML =
                    `<div class="loading">Error loading logs: ${error.message}</div>`;
            }
        }

        function changeLogLevel(level) {
            currentLogLevel = level;
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            fetchLogs(level);
        }

        function formatUptime(seconds) {
            if (seconds < 60) return `${seconds}s`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}h`;
            return `${Math.floor(seconds / 86400)}d`;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString();
        }

        function formatTimeUntil(timestamp) {
            const now = Date.now();
            const target = new Date(timestamp).getTime();
            const diff = target - now;

            if (diff <= 0) return 'now';

            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) {
                const remainingHours = hours % 24;
                return `in ${days}d ${remainingHours}h`;
            }
            if (hours > 0) {
                const remainingMinutes = minutes % 60;
                return `in ${hours}h ${remainingMinutes}m`;
            }
            if (minutes > 0) {
                const remainingSeconds = seconds % 60;
                return `in ${minutes}m ${remainingSeconds}s`;
            }
            return `in ${seconds}s`;
        }

        function formatLabel(key) {
            return key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase());
        }

        function formatTaskName(name) {
            const names = {
                storageCleanup: 'Storage Cleanup',
                tokenRefresh: 'Token Refresh',
                streamUrlRefresh: 'Stream URL Refresh'
            };
            return names[name] || name;
        }

        function showError(message) {
            document.getElementById('error-container').innerHTML =
                `<div class="error-message">${message}</div>`;
        }

        function clearError() {
            document.getElementById('error-container').innerHTML = '';
        }

        async function fetchStreamRefreshLogs() {
            try {
                const response = await fetch('/api/monitoring/stream-url-refresh-logs?limit=20');
                const data = await response.json();

                if (!data.success) throw new Error(data.error);

                // Update status
                const statusEl = document.getElementById('streamRefreshStatus');
                const statusMap = {
                    'idle': { bg: '#1e3a5f', color: '#60a5fa', text: 'Idle' },
                    'running': { bg: '#78350f', color: '#fbbf24', text: 'Running...' },
                    'completed': { bg: '#14532d', color: '#4ade80', text: 'Completed' },
                    'error': { bg: '#7f1d1d', color: '#fca5a5', text: 'Error' }
                };
                const status = statusMap[data.status] || statusMap['idle'];
                statusEl.style.backgroundColor = status.bg;
                statusEl.style.color = status.color;
                statusEl.innerHTML = `
                    <strong>Status:</strong> ${status.text}
                    ${data.lastRun ? ` | <strong>Last Run:</strong> ${formatTime(data.lastRun)}` : ''}
                    ${data.nextRun ? ` | <strong>Next Run:</strong> ${formatTimeUntil(data.nextRun)}` : ''}
                `;

                // Update logs
                const logsContainer = document.getElementById('streamRefreshLogs');
                if (data.logs.length > 0) {
                    logsContainer.innerHTML = data.logs.map(log => {
                        const isSuccess = log.success;
                        const isManual = log.manual;
                        return `
                            <div class="log-entry">
                                <span class="log-time">${formatTime(log.timestamp)}</span>
                                <span class="log-level ${isSuccess ? 'log-level-info' : 'log-level-error'}">
                                    ${isSuccess ? 'SUCCESS' : 'FAILED'}
                                </span>
                                <span class="log-message">
                                    ${isManual ? '[MANUAL] ' : ''}
                                    ${log.totalFavorites || 0} favorites |
                                    ${log.usersProcessed || 0} users |
                                    ${log.refreshed || 0} refreshed |
                                    ${log.skipped || 0} skipped |
                                    ${log.failed || 0} failed
                                    ${log.error ? `| Error: ${log.error}` : ''}
                                </span>
                            </div>
                        `;
                    }).join('');
                } else {
                    logsContainer.innerHTML = '<div class="loading">No logs available yet</div>';
                }
            } catch (error) {
                console.error('Failed to fetch stream refresh logs:', error);
                document.getElementById('streamRefreshLogs').innerHTML =
                    `<div class="loading">Error loading logs: ${error.message}</div>`;
            }
        }

        async function triggerStreamUrlRefresh() {
            const btn = document.getElementById('triggerStreamRefreshBtn');
            const originalText = btn.textContent;

            try {
                btn.disabled = true;
                btn.textContent = 'Starting...';

                const response = await fetch('/api/monitoring/stream-url-refresh-trigger', {
                    method: 'POST'
                });
                const data = await response.json();

                if (!data.success) throw new Error(data.error);

                btn.textContent = 'Job Started!';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 2000);

                // Refresh logs immediately
                await fetchStreamRefreshLogs();

                // Show success message
                showTemporaryMessage('Stream URL refresh job has been triggered. Check logs below for progress.', 'success');
            } catch (error) {
                btn.textContent = 'Failed';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 2000);

                showError('Failed to trigger stream URL refresh: ' + error.message);
            }
        }

        function showTemporaryMessage(message, type = 'info') {
            const container = document.getElementById('error-container');
            const bgColor = type === 'success' ? '#14532d' : '#1e3a5f';
            const textColor = type === 'success' ? '#4ade80' : '#60a5fa';

            container.innerHTML = `
                <div style="background: ${bgColor}; color: ${textColor}; padding: 12px; border-radius: 8px; margin-bottom: 16px;">
                    ${message}
                </div>
            `;

            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        async function refreshAll() {
            await Promise.all([
                fetchDashboard(),
                fetchApiUsage(),
                fetchLogs(currentLogLevel),
                fetchStreamRefreshLogs()
            ]);
        }

        // Auto-refresh setup
        function setupAutoRefresh() {
            const checkbox = document.getElementById('autoRefresh');

            if (checkbox.checked) {
                refreshInterval = setInterval(refreshAll, 10000);
            }

            checkbox.addEventListener('change', () => {
                if (checkbox.checked) {
                    refreshInterval = setInterval(refreshAll, 10000);
                } else {
                    clearInterval(refreshInterval);
                }
            });
        }

        // Initial load
        refreshAll();
        setupAutoRefresh();
    </script>
</body>
</html>
